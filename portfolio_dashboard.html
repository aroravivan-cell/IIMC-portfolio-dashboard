        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .dashboard {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        .header h1 {
            color: #2d3748;
            font-size: 2.5em;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            color: #718096;
            font-size: 1.1em;
            line-height: 1.6;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.15);
        }

        .stat-label {
            color: #718096;
            font-size: 0.9em;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-value {
            color: #2d3748;
            font-size: 2em;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .stat-comparison {
            color: #48bb78;
            font-size: 0.9em;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .stat-comparison.negative {
            color: #f56565;
        }

        .tab-container {
            background: white;
            border-radius: 15px;
            padding: 0;
            margin-bottom: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            overflow: hidden;
        }

        .tabs {
            display: flex;
            border-bottom: 2px solid #e2e8f0;
            background: #f7fafc;
        }

        .tab {
            padding: 20px 30px;
            cursor: pointer;
            border: none;
            background: transparent;
            color: #718096;
            font-size: 1em;
            font-weight: 600;
            transition: all 0.3s ease;
            border-bottom: 3px solid transparent;
        }

        .tab:hover {
            background: #edf2f7;
            color: #2d3748;
        }

        .tab.active {
            color: #667eea;
            border-bottom-color: #667eea;
            background: white;
        }

        .tab-content {
            padding: 30px;
        }

        .portfolio-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }

        .fund-card {
            background: linear-gradient(135deg, #f7fafc 0%, #edf2f7 100%);
            border-radius: 12px;
            padding: 20px;
            border-left: 4px solid #667eea;
            transition: all 0.3s ease;
        }

        .fund-card:hover {
            transform: translateX(5px);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.2);
        }

        .fund-header {
            margin-bottom: 15px;
        }

        .fund-name {
            font-weight: bold;
            color: #2d3748;
            font-size: 1.1em;
            margin-bottom: 5px;
        }

        .fund-ticker {
            color: #667eea;
            font-weight: 600;
            font-size: 0.9em;
        }

        .fund-metrics {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .metric {
            background: white;
            padding: 10px;
            border-radius: 8px;
        }

        .metric-label {
            font-size: 0.75em;
            color: #718096;
            margin-bottom: 3px;
        }

        .metric-value {
            font-weight: bold;
            color: #2d3748;
            font-size: 1.1em;
        }

        .metric-value.positive {
            color: #48bb78;
        }

        .metric-value.negative {
            color: #f56565;
        }

        .chart-container {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .chart-title {
            font-size: 1.3em;
            font-weight: bold;
            color: #2d3748;
            margin-bottom: 20px;
        }

        .info-box {
            background: linear-gradient(135deg, #667eea15 0%, #764ba215 100%);
            border-left: 4px solid #667eea;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .info-box h3 {
            color: #2d3748;
            margin-bottom: 10px;
        }

        .info-box p {
            color: #4a5568;
            line-height: 1.6;
        }

        .info-box ul {
            margin-left: 20px;
            color: #4a5568;
            line-height: 1.8;
        }

        .filter-section {
            background: #f7fafc;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .filter-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .filter-item label {
            display: block;
            color: #4a5568;
            font-weight: 600;
            margin-bottom: 5px;
            font-size: 0.9em;
        }

        .filter-item select,
        .filter-item input {
            width: 100%;
            padding: 10px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 0.95em;
            transition: border-color 0.3s ease;
        }

        .filter-item select:focus,
        .filter-item input:focus {
            outline: none;
            border-color: #667eea;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #f7fafc;
            padding: 15px;
            text-align: left;
            color: #4a5568;
            font-weight: 600;
            border-bottom: 2px solid #e2e8f0;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #e2e8f0;
            color: #2d3748;
        }

        tr:hover {
            background: #f7fafc;
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.85em;
            font-weight: 600;
        }

        .badge-low {
            background: #c6f6d5;
            color: #22543d;
        }

        .badge-medium {
            background: #feebc8;
            color: #7c2d12;
        }

        .badge-high {
            background: #fed7d7;
            color: #742a2a;
        }

        .explanation-section {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        .explanation-section h2 {
            color: #2d3748;
            margin-bottom: 20px;
            font-size: 1.8em;
        }

        .explanation-section h3 {
            color: #4a5568;
            margin: 20px 0 10px 0;
            font-size: 1.3em;
        }

        .key-metrics {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }

        .key-metric-card {
            background: linear-gradient(135deg, #f0f4ff 0%, #e8eeff 100%);

            border-radius: 10px;
            border-left: 3px solid #667eea;
        }

            color: #2d3748;
            margin-bottom: 5px;
            font-size: 0.95em;
        }

        .key-metric-card p {
            color: #4a5568;
            font-size: 0.9em;
            line-height: 1.5;
        }
    </style>
</head>

                        <div className="tabs">
                            <button 
                                className={`tab ${activeTab === 'portfolio' ? 'active' : ''}`}
                                onClick={() => setActiveTab('portfolio')}
                            >
                                🎯 Optimized Portfolio
                            </button>
                            <button 
                                className={`tab ${activeTab === 'analytics' ? 'active' : ''}`}
                                onClick={() => setActiveTab('analytics')}
                            >
                                📈 Analytics
                            </button>
                            <button 
                                className={`tab ${activeTab === 'explanation' ? 'active' : ''}`}
                                onClick={() => setActiveTab('explanation')}
                            >
                                💡 Methodology
                            </button>
                        </div>

                        <div className="tab-content">
                            {activeTab === 'portfolio' && (
                                <>
                                    <div className="filter-section">
                                        <h3 style={{marginBottom: '15px', color: '#2d3748'}}>Filter Portfolio</h3>
                                        <div className="filter-grid">
                                            <div className="filter-item">
                                                <label>Sector</label>
                                                <select value={sectorFilter} onChange={(e) => setSectorFilter(e.target.value)}>
                                                    <option value="all">All Sectors</option>
                                                    {Object.keys(portfolioData.sector_dist).map(sector => (
                                                        <option key={sector} value={sector}>{sector}</option>
                                                    ))}
                                                </select>
                                            </div>
                                            <div className="filter-item">
                                                <label>Risk Level</label>
                                                <select value={riskFilter} onChange={(e) => setRiskFilter(e.target.value)}>
                                                    <option value="all">All Risk Levels</option>
                                                    <option value="low">Low Risk (&lt;90)</option>
                                                    <option value="high">Higher Risk (≥90)</option>
                                                </select>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="portfolio-grid">
                                        {filteredPortfolio.map((fund, index) => (
                                            <div key={fund.fund_id} className="fund-card">
                                                <div className="fund-header">
                                                    <div className="fund-name">#{index + 1} {fund.fund_name}</div>
                                                    <div className="fund-ticker">{fund.ticker} • {fund.sector}</div>
                                                </div>
                                                <div className="fund-metrics">
                                                    <div className="metric">
                                                        <div className="metric-label">Tariff Return</div>
                                                        <div className={`metric-value ${getValueClass(fund.return_tariff)}`}>
                                                            {formatPercent(fund.return_tariff)}
                                                        </div>
                                                    </div>
                                                    <div className="metric">
                                                        <div className="metric-label">1Y Return</div>
                                                        <div className={`metric-value ${getValueClass(fund.return_1y)}`}>
                                                            {formatPercent(fund.return_1y)}
                                                        </div>
                                                    </div>
                                                    <div className="metric">
                                                        <div className="metric-label">Sharpe Ratio</div>
                                                        <div className="metric-value">
                                                            {formatNumber(fund.sharpe)}
                                                        </div>
                                                    </div>
                                                    <div className="metric">
                                                        <div className="metric-label">Risk Score</div>
                                                        <div className="metric-value">
                                                            {formatNumber(fund.tariff_risk_score)}
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </>
                            )}

                            {activeTab === 'analytics' && (
                                <>
                                    <div className="chart-container">
                                        <div className="chart-title">Portfolio Sector Allocation</div>
                                        <div style={{height: '300px', position: 'relative'}}>
                                            <canvas id="sectorChart"></canvas>
                                        </div>
                                    </div>

                                    <div className="chart-container">
                                        <div className="chart-title">Performance vs Market Benchmark</div>
                                        <div style={{height: '300px', position: 'relative'}}>
                                            <canvas id="performanceChart"></canvas>
                                        </div>
                                    </div>

                                    <div className="info-box">
                                        <h3>🎯 Portfolio Insights</h3>
                                        <ul>
                                            <li>The optimized portfolio outperforms the market average by <strong>{(portfolioData.stats.portfolio_avg_return_tariff - portfolioData.stats.avg_return_tariff).toFixed(2)}%</strong> during tariff episodes</li>
                                            <li>Average Sharpe ratio of <strong>{portfolioData.stats.portfolio_avg_sharpe.toFixed(2)}</strong> indicates strong risk-adjusted returns</li>
                                            <li>Diversified across <strong>{Object.keys(portfolioData.portfolio_sector_dist).length}</strong> sectors to minimize concentration risk</li>
                                            <li>Technology sector dominates with {portfolioData.portfolio_sector_dist['Technology']} funds, balanced by defensive sectors</li>
                                        </ul>
                                    </div>
                                </>
                            )}

                            {activeTab === 'explanation' && (
                                <div>
                                    <h2 style={{marginBottom: '20px', color: '#2d3748'}}>Investment Methodology</h2>
                                    
                                    <div className="info-box">
                                        <h3>📋 Data Analysis Process</h3>
                                        <p>Our analysis evaluated 300 funds across multiple dimensions:</p>
                                        <ul>
                                            <li><strong>Tariff Exposure Analysis:</strong> Assessed each fund's vulnerability to trade barriers through import/export exposure, China dependency, and supply chain concentration</li>
                                            <li><strong>Historical Performance Review:</strong> Analyzed returns specifically during documented tariff episodes (2018-2019 trade war, recent trade tensions)</li>
                                            <li><strong>Risk-Adjusted Returns:</strong> Calculated Sharpe ratios to identify funds with optimal return-to-risk profiles</li>
                                            <li><strong>Geographic Diversification:</strong> Evaluated regional exposure to identify funds with resilient geographic allocations</li>
                                            <li><strong>Sector Resilience:</strong> Identified sectors showing strength during trade disputes</li>
                                        </ul>
                                    </div>

                                    <div className="info-box">
                                        <h3>🔍 Selection Criteria</h3>
                                        <p>Funds were scored using our proprietary composite ranking:</p>
                                        <ul>
                                            <li><strong>30% Weight:</strong> Return during tariff episodes - prioritizing proven resilience</li>
                                            <li><strong>25% Weight:</strong> Sharpe ratio - ensuring efficient risk-adjusted returns</li>
                                            <li><strong>20% Weight:</strong> Low tariff risk score - minimizing vulnerability</li>
                                            <li><strong>15% Weight:</strong> 1-year returns - confirming recent performance</li>
                                            <li><strong>10% Weight:</strong> Low volatility - promoting stability</li>
                                        </ul>
                                    </div>

                                    <div className="info-box">
                                        <h3>💼 Why These Funds?</h3>
                                        <p>The top 15 selected funds represent:</p>
                                        <ul>
                                            <li>Proven track records of outperformance during trade tensions</li>
                                            <li>Diversification across sectors and geographies to spread risk</li>
                                            <li>Strong fundamental metrics (Sharpe ratio, returns, low volatility)</li>
                                            <li>Lower-than-average tariff exposure while maintaining growth potential</li>
                                            <li>Supply chain resilience through diversified holdings</li>
                                        </ul>
                                    </div>

                                    <div className="info-box">
                                        <h3>⚠️ Important Considerations</h3>
                                        <ul>
                                            <li>Past performance during tariff episodes does not guarantee future results</li>
                                            <li>Trade policy is dynamic and can change rapidly</li>
                                            <li>This portfolio is optimized for tariff resilience but may underperform in other market conditions</li>
                                            <li>Consider your personal risk tolerance and investment timeline</li>
                                            <li>Diversification does not guarantee profits or protect against all losses</li>
                                            <li>Consult with a financial advisor for personalized investment advice</li>
                                        </ul>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        ReactDOM.render(<Dashboard />, document.getElementById('root'));
    </script>
</body>
</html>
